<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Music Portfolio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

html{
scroll-behavior:smooth;
}

body{
background:#061b0d;
color:white;
}


/* เมนู */

nav{
position:fixed;
top:0;
width:100%;
background:#043d1b;
padding:15px;
text-align:center;
z-index:99;
}

nav a{
color:white;
text-decoration:none;
background:#0b6b32;
padding:10px 20px;
margin:5px;
border-radius:30px;
}

nav a:hover{
background:#00ff66;
color:black;
}



/* หน้าแรก */

header{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

text-align:center;

background-size:cover;
background-position:center;

animation:bg 12s infinite;

}


@keyframes bg{

0%{
background-image:
linear-gradient(#0008,#0008),
url("images/bg1.jpg");
}

50%{
background-image:
linear-gradient(#0008,#0008),
url("images/bg2.jpg");
}

100%{
background-image:
linear-gradient(#0008,#0008),
url("images/bg3.jpg");
}

}



.profile{

width:200px;
height:200px;

border-radius:50%;

border:5px solid #00ff66;

object-fit:cover;

}


h1{

font-size:45px;

color:#00ff66;

margin:20px;

}



.btn{

background:#00ff66;

color:black;

padding:15px 40px;

border-radius:30px;

display:inline-block;

margin-top:20px;

text-decoration:none;

}




section{

padding:80px 10%;

}



h2{

text-align:center;

color:#00ff66;

margin-bottom:30px;

}



.box{

background:#0d2b17;

padding:30px;

border-radius:20px;

text-align:center;

}



/* ผลงาน */

.gallery{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}


.gallery img{

width:100%;

height:250px;

object-fit:cover;

border-radius:15px;

cursor:pointer;

border:3px solid #0b6b32;

}


.gallery img:hover{

transform:scale(1.05);

border-color:#00ff66;

}



/* รูปใหญ่ */

#lightbox{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000d;

justify-content:center;

align-items:center;

z-index:999;

}


#lightbox img{

max-width:80%;

max-height:80%;

border:5px solid #00ff66;

border-radius:20px;

}



button{

position:absolute;

font-size:40px;

background:#00ff66;

border:none;

border-radius:50%;

padding:10px 20px;

cursor:pointer;

}


.prev{

left:30px;

}


.next{

right:30px;

}



footer{

background:#021006;

padding:20px;

text-align:center;

}



</style>

</head>


<body>


<nav>

<a href="#home">หน้าแรก</a>

<a href="#about">เกี่ยวกับฉัน</a>

<a href="#work">ผลงาน</a>

<a href="#contact">ติดต่อ</a>

</nav>



<header id="home">

<div>

<img class="profile"
src="751134574_1051227694222043_2419989609353775438_n.jpg">


<h1>
แฟ้มสะสมผลงาน
</h1>


<p>
รณภพ โพธิ์รักษา
</p>


<a class="btn" href="#work">
ดูผลงาน
</a>

</div>

</header>




<section id="about">

<h2>เกี่ยวกับฉัน</h2>


<div class="box">

ชื่อ : รณภพ โพธิ์รักษา

<br><br>

นักเรียนผู้มีความสนใจด้านดนตรี

<br><br>

มุ่งมั่นพัฒนาทักษะการบรรเลง
และสร้างผลงานทางดนตรี


</div>

</section>




<section id="work">


<h2>
ผลงานของฉัน
</h2>


<div class="gallery">


<img src="SWU_10090110702501A-0-D0101_1749800445651_page-0001.jpg" onclick="openImage(0)">

<img src="SWU_10090110702501A-0-D0101_1749800445651_page-0002.jpg" onclick="openImage(1)">

<img src="SWU_10090110702501A-0-D0101_1749800445651_page-0003.jpg" onclick="openImage(2)">

<img src="SWU_10090110702501A-0-D0101_1749800445651_page-0004.jpg" onclick="openImage(3)">

<img src="SWU_10090110702501A-0-D0101_1749800445651_page-0005.jpg" onclick="openImage(4)">

<img src="SWU_10090110702501A-0-D0101_1749800445651_page-0006.jpg" onclick="openImage(5)">

<img src="SWU_10090110702501A-0-D0101_1749800445651_page-0007.jpg" onclick="openImage(6)">

<img src="SWU_10090110702501A-0-D0101_1749800445651_page-0008.jpg" onclick="openImage(7)">

<img src="SWU_10090110702501A-0-D0101_1749800445651_page-0009.jpg" onclick="openImage(8)">

<img src="SWU_10090110702501A-0-D0101_1749800445651_page-0010.jpg" onclick="openImage(9)">


</div>

</section>




<section id="contact">

<h2>
ติดต่อ
</h2>


<div class="box">

Facebook : ใส่ชื่อ

<br>

Email : ใส่อีเมล

</div>


</section>




<footer>

© 2026 Music Portfolio

</footer>




<div id="lightbox">


<button class="prev" onclick="prev()">❮</button>


<img id="big">


<button class="next" onclick="next()">❯</button>


</div>





<script>


let img=[

"SWU_10090110702501A-0-D0101_1749800445651_page-0001.jpg",

"SWU_10090110702501A-0-D0101_1749800445651_page-0002.jpg",

"SWU_10090110702501A-0-D0101_1749800445651_page-0003.jpg",

"SWU_10090110702501A-0-D0101_1749800445651_page-0004.jpg",

"SWU_10090110702501A-0-D0101_1749800445651_page-0005.jpg",

"SWU_10090110702501A-0-D0101_1749800445651_page-0006.jpg",

"SWU_10090110702501A-0-D0101_1749800445651_page-0007.jpg",

"SWU_10090110702501A-0-D0101_1749800445651_page-0008.jpg",

"SWU_10090110702501A-0-D0101_1749800445651_page-0009.jpg",

"SWU_10090110702501A-0-D0101_1749800445651_page-00010.jpg"

];


let index = 0;


let index=0;



function openImage(i){

index=i;

document.getElementById("big").src=img[index];

document.getElementById("lightbox").style.display="flex";

}



function next(){

index++;

if(index>=img.length){

index=0;

}

document.getElementById("big").src=img[index];

}



function prev(){

index--;

if(index<0){

index=img.length-1;

}

document.getElementById("big").src=img[index];

}



document.getElementById("lightbox").onclick=function(e){

if(e.target.id=="lightbox"){

this.style.display="none";

}

}


</script>


</body>
</html>
