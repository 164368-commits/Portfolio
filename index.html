<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    text-align:center;
    padding:50px 20px;
    background:linear-gradient(45deg,#0f2027,#203a43,#2c5364);
}

header img{
    width:180px;
    height:180px;
    border-radius:50%;
    border:5px solid white;
    object-fit:cover;
}

header h1{
    margin-top:20px;
    font-size:40px;
}

header p{
    margin-top:10px;
    color:#ddd;
}

section{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:50px 0;
}

h2{
    text-align:center;
    margin-bottom:30px;
    color:#00e5ff;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:15px;
    transition:.3s;
    cursor:pointer;
}

.gallery img:hover{
    transform:scale(1.05);
}

footer{
    text-align:center;
    padding:20px;
    background:#000;
    color:#aaa;
}
</style>

</head>
<body>

<header>

<!-- รูปโปรไฟล์ -->
<img src="images/profile.jpg" alt="Profile">

<h1>ชื่อ - นามสกุล</h1>

<p>Portfolio | นักเรียน | นักดนตรี</p>

</header>

<section>

<h2>ผลงานของฉัน</h2>

<div class="gallery">

<img src="images/1.jpg">
<img src="images/2.jpg">
<img src="images/3.jpg">
<img src="images/4.jpg">
<img src="images/5.jpg">
<img src="images/6.jpg">
<img src="images/7.jpg">
<img src="images/8.jpg">
<img src="images/9.jpg">
<img src="images/10.jpg">

</div>

</section>

<footer>

© 2026 My Portfolio

</footer>

</body>
</html>
