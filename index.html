<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Green Music Portfolio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#061b0d;
    color:white;
}

/* เมนู */
nav{
    position:fixed;
    top:0;
    width:100%;
    background:#043d1b;
    padding:15px;
    text-align:center;
    z-index:10;
}

nav a{
    color:white;
    text-decoration:none;
    margin:8px;
    padding:10px 20px;
    border-radius:25px;
    background:#0b6b32;
    transition:.3s;
}

nav a:hover{
    background:#00ff66;
    color:#003d16;
}


/* หน้าแรก */

header{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    background:
    linear-gradient(
    rgba(0,60,25,.7),
    rgba(0,0,0,.8)),
    url("images/bg.jpg");

    background-size:cover;
}


.profile{

    width:200px;
    height:200px;
    border-radius:50%;
    border:5px solid #00ff66;
    object-fit:cover;

}


h1{

    font-size:45px;
    margin:20px;

    color:#00ff66;

}


.btn{

    display:inline-block;
    margin-top:20px;
    padding:15px 40px;

    background:#00ff66;
    color:#003d16;

    border-radius:30px;
    text-decoration:none;
    font-weight:bold;

    transition:.3s;

}


.btn:hover{

    background:white;

}



/* เนื้อหา */

section{

    padding:80px 10%;

}


h2{

    text-align:center;
    color:#00ff66;
    margin-bottom:35px;

}


.box{

    background:#0d2b17;

    padding:30px;

    border-radius:20px;

    text-align:center;

    border:1px solid #00ff66;

}



/* รูปผลงาน */

.gallery{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:20px;

}



.gallery img{

    width:100%;

    height:250px;

    object-fit:cover;

    border-radius:15px;

    border:3px solid #0b6b32;

    transition:.3s;

}



.gallery img:hover{

    transform:scale(1.05);

    border-color:#00ff66;

}



/* Footer */

footer{

    background:#021006;

    padding:20px;

    text-align:center;

    color:#aaa;

}


</style>

</head>


<body>

<a href="#home">หน้าแรก</a>

<a href="#about">เกี่ยวกับฉัน</a>
